<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提案書作成完了！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .confetti-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(850px) rotate(720deg); opacity: 0; }
    }

    .success-content {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; padding: 40px 32px; gap: 20px;
      position: relative; z-index: 1;
    }
    .check-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: #0D9488; box-shadow: 0 6px 0 #0A7A70;
      display: flex; align-items: center; justify-content: center;
      animation: checkBounce 0.5s ease 0.3s both;
    }
    @keyframes checkBounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .success-title {
      font-weight: 900; font-size: 26px; line-height: 32px;
      color: #3C2A4D; text-align: center;
      animation: fadeUp 0.4s ease 0.5s both;
    }
    .success-subtitle {
      font-weight: 500; font-size: 14px; color: #AFAFAF; text-align: center;
      animation: fadeUp 0.4s ease 0.6s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .summary-card {
      display: flex; flex-direction: column; width: 100%; align-items: center;
      border-radius: 16px; padding: 20px; gap: 12px; background: #F9FAFB;
      animation: fadeUp 0.4s ease 0.7s both;
    }
    .summary-profile { display: flex; align-items: center; gap: 10px; }
    .summary-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: #9B8AAE;
      display: flex; align-items: center; justify-content: center;
      color: #FFF; font-weight: 800; font-size: 14px; flex-shrink: 0;
    }
    .summary-name { font-weight: 700; font-size: 13px; color: #3C2A4D; }
    .summary-meta { font-weight: 500; font-size: 10px; color: #AFAFAF; }
    .tag-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .tag { padding: 4px 10px; border-radius: 10px; font-weight: 700; font-size: 10px; }
    .tag-teal { background: #E6FFFE; color: #0D9488; }
    .tag-blue { background: #DBEAFE; color: #3B82F6; }
    .tag-amber { background: #FFF8EB; color: #D97706; }

    .bottom-actions {
      display: flex; flex-direction: column; padding: 0 32px 36px;
      gap: 10px; flex-shrink: 0; position: relative; z-index: 1;
    }
    .btn-primary {
      display: flex; width: 100%; align-items: center; justify-content: center;
      padding: 16px; border-radius: 16px; background: #E25D4E; box-shadow: 0 5px 0 #C04538;
      color: #FFF; font-weight: 800; font-size: 16px;
      cursor: pointer; border: none; font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:active { transform: translateY(3px); box-shadow: 0 2px 0 #C04538; }
    .btn-outline {
      display: flex; width: 100%; align-items: center; justify-content: center;
      padding: 14px; border-radius: 16px; background: #FFF; border: 2px solid #ECECEC;
      box-shadow: 0 3px 0 #ECECEC; color: #AFAFAF; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-outline:active { transform: translateY(2px); box-shadow: 0 1px 0 #ECECEC; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- Confetti -->
    <div class="confetti-layer" id="confetti"></div>

    <!-- Content -->
    <div class="success-content">
      <div class="check-circle">
        <svg width="48" height="48" viewBox="0 0 48 48"><path d="M14 24l8 8 14-16" fill="none" stroke="#FFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="success-title">提案書を作成しました！</div>
      <div class="success-subtitle">福国 花子さんの提案書が<br>準備できました</div>
      <div class="summary-card">
        <div class="summary-profile">
          <div class="summary-avatar">花</div>
          <div>
            <div class="summary-name">福国 花子</div>
            <div class="summary-meta">見込み客 ・ 35歳 ・ 港区</div>
          </div>
        </div>
        <div class="tag-row">
          <span class="tag tag-teal">医療保険</span>
          <span class="tag tag-blue">死亡保険</span>
          <span class="tag tag-amber">年金プラン</span>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="bottom-actions">
      <a href="profile.html"><button class="btn-primary">提案書を確認する</button></a>
      <a href="index.html"><button class="btn-outline">顧客リストに戻る</button></a>
    </div>
  </div>

  <script>
    (function createConfetti() {
      var container = document.getElementById('confetti');
      var colors = ['#E25D4E', '#0D9488', '#D97706', '#3B82F6', '#9B8AAE', '#C41E2E'];
      for (var i = 0; i < 60; i++) {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        var w = 6 + Math.random() * 8;
        var h = 4 + Math.random() * 10;
        var left = Math.random() * 100;
        var delay = Math.random() * 1.5;
        var duration = 2.5 + Math.random() * 2;
        piece.style.width = w + 'px';
        piece.style.height = h + 'px';
        piece.style.left = left + '%';
        piece.style.top = '-20px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = duration + 's';
        piece.style.animationDelay = delay + 's';
        if (Math.random() > 0.5) piece.style.borderRadius = '50%';
        container.appendChild(piece);
      }
    })();
  </script>
</body>
</html>
